spring.application.name=gymbackend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/gymdb?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always

server.port=${SERVER_PORT:8080}

# 文件上传配置
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# 自动取消超时未支付预约（默认每分钟执行一次）
booking.auto-cancel.cron=${BOOKING_AUTO_CANCEL_CRON:0 */1 * * * *}

